<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Website Archaeologist</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link
  href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600&display=swap"
  rel="stylesheet"
/>
<style>
  :root {
    --bg: #16130f;
    --bg-panel: #1c1811;
    --bg-panel-raised: #241f17;
    --border: #382f22;
    --border-soft: #2a2419;
    --text-primary: #ece4d3;
    --text-secondary: #a99c86;
    --text-muted: #756b5a;
    --accent-verdigris: #6fa88f;
    --accent-brass: #c9974c;
    --accent-rust: #8b4a32;
    --danger: #b5533c;
    --font-display: "Fraunces", serif;
    --font-body: "IBM Plex Sans", sans-serif;
    --font-mono: "IBM Plex Mono", monospace;
    --radius: 6px;
  }

  * { box-sizing: border-box; }
  @media (prefers-reduced-motion: reduce) { * { animation: none !important; transition: none !important; } }

  body {
    margin: 0;
    width: 340px;
    background: var(--bg);
    color: var(--text-primary);
    font-family: var(--font-body);
  }

  :focus-visible { outline: 2px solid var(--accent-verdigris); outline-offset: 2px; }

  header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 16px 18px 14px;
    border-bottom: 1px solid var(--border);
  }
  .mark { width: 26px; height: 26px; color: var(--accent-brass); flex-shrink: 0; }
  h1 { font-family: var(--font-display); font-size: 15px; font-weight: 600; margin: 0; }

  .body { padding: 16px 18px 18px; }

  .tab-url {
    font-family: var(--font-mono);
    font-size: 11.5px;
    color: var(--text-secondary);
    background: var(--bg-panel-raised);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 8px 10px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    margin-bottom: 14px;
  }

  .status-row { display: flex; align-items: center; gap: 8px; margin-bottom: 14px; }
  .status-dot { width: 9px; height: 9px; border-radius: 50%; background: var(--text-muted); flex-shrink: 0; }
  .status-dot.scanning { background: var(--accent-brass); animation: pulse 1.1s ease-in-out infinite; }
  .status-dot.done { background: var(--accent-verdigris); }
  .status-dot.error { background: var(--danger); }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.35; } }
  .status-text { font-size: 13px; color: var(--text-secondary); }
  .status-text strong { color: var(--text-primary); font-weight: 600; }

  .evidence-count { font-family: var(--font-mono); font-size: 11.5px; color: var(--text-muted); margin-bottom: 16px; min-height: 14px; }

  button {
    width: 100%;
    font-family: var(--font-body);
    font-size: 13.5px;
    font-weight: 600;
    padding: 10px 14px;
    border-radius: var(--radius);
    border: 1px solid transparent;
    cursor: pointer;
    margin-bottom: 10px;
  }
  button:disabled { cursor: not-allowed; opacity: 0.45; }

  #start-btn { background: var(--accent-brass); color: #1a140b; }
  #start-btn:hover:not(:disabled) { filter: brightness(1.08); }

  #stop-btn { background: var(--bg-panel-raised); color: var(--text-secondary); border-color: var(--border); }
  #stop-btn:hover:not(:disabled) { color: var(--text-primary); border-color: var(--accent-rust); }

  #view-report-btn { background: transparent; color: var(--accent-verdigris); border-color: var(--accent-verdigris); }
  #view-report-btn:hover:not(:disabled) { background: rgba(111, 168, 143, 0.1); }

  .error-text { font-size: 12px; color: var(--danger); margin: -4px 0 12px; }

  .note {
    font-size: 11.5px;
    color: var(--text-muted);
    line-height: 1.5;
    margin-top: 4px;
    padding-top: 12px;
    border-top: 1px solid var(--border-soft);
  }
</style>
</head>
<body>

<header>
  <svg class="mark" viewBox="0 0 40 40" fill="none" aria-hidden="true">
    <circle cx="20" cy="20" r="18" stroke="currentColor" stroke-width="1.4" opacity="0.5" />
    <circle cx="20" cy="20" r="12" stroke="currentColor" stroke-width="1.4" opacity="0.75" />
    <circle cx="20" cy="20" r="6" stroke="currentColor" stroke-width="1.4" />
    <circle cx="20" cy="20" r="1.6" fill="currentColor" />
  </svg>
  <h1>Website Archaeologist</h1>
</header>

<div class="body">
  <div id="tab-url" class="tab-url">—</div>

  <div class="status-row">
    <span id="status-dot" class="status-dot"></span>
    <span id="status-text" class="status-text">Ready to scan</span>
  </div>

  <div id="evidence-count" class="evidence-count"></div>
  <p id="error-text" class="error-text" hidden></p>

  <button id="start-btn" type="button">Start Scan</button>
  <button id="stop-btn" type="button" hidden>Stop Scan</button>
  <button id="view-report-btn" type="button" disabled>View Report</button>

  <p class="note">Scanning uses Chrome's debugger to observe network and DOM activity. Chrome will show a "this tab is being debugged" banner while a scan runs — nothing on the page is modified.</p>
</div>

<script type="module" src="popup.js"></script>
</body>
</html>
